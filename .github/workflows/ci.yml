name: CI - Security Lab

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify MCP server imports
        run: python3 -c "from mcp.server.fastmcp import FastMCP; print('MCP imports OK')"

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 mcp_server.py server.py --max-line-length=120 --ignore=E501,W503

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-kali-lab-mcp-server .

      - name: Verify container runs as non-root
        run: |
          CONTAINER_USER=mcp
          echo "Container user: "
          if [ "" = "root" ]; then
            echo "ERROR: Container running as root!"
            exit 1
          fi
          echo "PASS: Container running as non-root user"
