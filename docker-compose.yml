services:
  mcp-server:
    build: .
    ports:
      - '8000:8000'
    networks:
      - lab-network
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
      - NET_ADMIN
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  dvwa:
    image: ghcr.io/digininja/dvwa:latest
    ports:
      - '8080:80'
    networks:
      - lab-network
    restart: unless-stopped
    environment:
      - DB_SERVER=db

  db:
    image: mariadb:10
    environment:
      - MYSQL_ROOT_PASSWORD=dvwa
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=p@ssw0rd
    networks:
      - lab-network
    restart: unless-stopped

networks:
  lab-network:
    driver: bridge
